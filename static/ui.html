<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>code-share</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: monospace; background: #0d1117; color: #e6edf3; padding: 1.5rem; max-width: 900px; margin: 0 auto; }
  h1 { color: #58a6ff; margin-bottom: 1.5rem; font-size: 1.4rem; }
  h2 { color: #8b949e; font-size: 0.9rem; text-transform: uppercase; letter-spacing: 0.1em; margin: 1.5rem 0 0.75rem; }
  .card { background: #161b22; border: 1px solid #30363d; border-radius: 6px; padding: 1rem; margin-bottom: 1rem; }
  .row { display: flex; align-items: center; gap: 0.75rem; margin-bottom: 0.5rem; }
  .label { color: #8b949e; min-width: 100px; flex-shrink: 0; }
  .val { color: #e6edf3; word-break: break-all; flex: 1; min-width: 0; }
  .badge { display: inline-block; padding: 2px 8px; border-radius: 12px; font-size: 0.75rem; }
  .badge-green  { background: #1a4731; color: #3fb950; }
  .badge-gray   { background: #21262d; color: #8b949e; }
  .badge-blue   { background: #1c3452; color: #58a6ff; }
  .badge-yellow { background: #3d2e00; color: #d29922; }
  .badge-orange { background: #3d1f00; color: #f0883e; }
  /* Req 1 fix: prevent buttons from being pushed outside flex containers */
  button { background: #238636; color: #fff; border: none; padding: 4px 12px; border-radius: 4px; cursor: pointer; font-family: monospace; font-size: 0.85rem; flex-shrink: 0; }
  button:hover { background: #2ea043; }
  button.danger { background: #b62324; }
  button.danger:hover { background: #da3633; }
  button.secondary { background: #21262d; color: #e6edf3; border: 1px solid #30363d; }
  button.secondary:hover { background: #30363d; }
  input, select { background: #0d1117; border: 1px solid #30363d; color: #e6edf3; padding: 6px 10px; border-radius: 4px; font-family: monospace; font-size: 0.85rem; width: 100%; }
  .copy-btn { min-width: 60px; background: #1c3452; color: #58a6ff; border: 1px solid #1c3452; }
  .copy-btn:hover { background: #264a70; }
  /* Req 1 fix: text wrapper fills available space and allows shrinking */
  .project-row { display: flex; align-items: center; gap: 0.75rem; padding: 0.5rem 0; border-bottom: 1px solid #21262d; }
  .project-row:last-child { border-bottom: none; }
  .project-row > .project-info { flex: 1; min-width: 0; overflow: hidden; }
  .project-name { font-weight: bold; }
  /* Req 1 fix: truncate long paths instead of overflowing */
  .project-path { color: #8b949e; font-size: 0.8rem; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .project-controls { display: flex; align-items: center; gap: 0.5rem; flex-shrink: 0; }
  .error { color: #f85149; font-size: 0.85rem; margin-top: 0.5rem; }
  .success { color: #3fb950; font-size: 0.85rem; margin-top: 0.5rem; }
  .section-row { display: flex; gap: 0.5rem; align-items: flex-end; margin-bottom: 0.75rem; }
  .section-row > div { flex: 1; min-width: 0; }
  .section-row label { color: #8b949e; font-size: 0.8rem; display: block; margin-bottom: 4px; }
  #connect-msg { margin-top: 0.5rem; font-size: 0.85rem; }
  .peer-card { margin-bottom: 0.75rem; padding-bottom: 0.75rem; border-bottom: 1px solid #21262d; }
  .peer-card:last-child { border-bottom: none; margin-bottom: 0; padding-bottom: 0; }
  .peer-header { display: flex; align-items: center; gap: 0.75rem; margin-bottom: 0.35rem; }
  .peer-projects { padding-left: 1rem; margin-top: 0.35rem; }
  .peer-project-item { font-size: 0.8rem; color: #8b949e; padding: 2px 0; }
  .sync-indicator { font-size: 0.75rem; margin-left: 4px; }
</style>
</head>
<body>
<h1>code-share</h1>

<h2>Your Link</h2>
<div class="card" id="status-card">
  <div class="row"><span class="label">Status</span><span class="val" id="s-status">Loading…</span></div>
  <div class="row"><span class="label">LAN URL</span><span class="val" id="s-lan">—</span><button class="copy-btn" onclick="copy('s-lan')">Copy</button></div>
  <div class="row"><span class="label">Tunnel URL</span><span class="val" id="s-tunnel">—</span><button class="copy-btn" onclick="copy('s-tunnel')">Copy</button></div>
  <div class="row"><span class="label">Connection</span><span class="val" id="s-cs">—</span><button class="copy-btn" onclick="copy('s-cs')">Copy</button></div>
</div>

<h2>Projects under PROJECTS_ROOT</h2>
<div class="card" id="projects-card"><div style="color:#8b949e">Loading…</div></div>

<h2>Connect a Peer</h2>
<div class="card">
  <div class="section-row">
    <div>
      <label>Connection string (paste peer's cs1:… string)</label>
      <input id="c-cs" placeholder="cs1:…">
    </div>
  </div>
  <div class="section-row">
    <div><label>Peer name (local label)</label><input id="c-name" value="peer"></div>
  </div>
  <button onclick="doConnect()">Connect</button>
  <div id="connect-msg"></div>
</div>

<h2>Connected Peers</h2>
<div class="card" id="peers-card"><div style="color:#8b949e">No peers connected.</div></div>

<script>
let status = null;
let sharedRegistry = [];

// ── Connection string helpers (Req 5 + 6) ───────────────────────────────────

function makeConnectionString(rawUrl, token) {
  if (!rawUrl || rawUrl === '—') return null;
  try {
    const u = new URL(rawUrl);
    u.username = '';
    u.password = '';
    const bare = u.toString().replace(/\/$/, '');
    const json = JSON.stringify({ url: bare, token });
    return 'cs1:' + btoa(json).replace(/\+/g, '-').replace(/\//g, '_').replace(/=/g, '');
  } catch { return null; }
}

function parseConnectionString(s) {
  if (!s || !s.startsWith('cs1:')) return null;
  try {
    const b64 = s.slice(4).replace(/-/g, '+').replace(/_/g, '/');
    const pad = b64 + '=='.slice(0, (4 - b64.length % 4) % 4);
    return JSON.parse(atob(pad));
  } catch { return null; }
}

// ── Main load ────────────────────────────────────────────────────────────────

async function load() {
  try {
    const [s, p] = await Promise.all([
      fetch('/api/status').then(r => r.json()),
      fetch('/api/projects').then(r => r.json())
    ]);
    status = s;
    sharedRegistry = s.shared || [];
    renderStatus(s);
    renderProjects(p, sharedRegistry);
    renderPeers(s.peers || []);
  } catch(e) {
    document.getElementById('s-status').textContent = 'Error: ' + e.message;
  }
}

// ── Render helpers ───────────────────────────────────────────────────────────

function renderStatus(s) {
  document.getElementById('s-status').innerHTML = '<span class="badge badge-green">serving</span>';

  const lanRaw    = s.selfUrl   || null;
  const tunnelRaw = s.tunnelUrl || null;
  document.getElementById('s-lan').textContent    = lanRaw    || '—';
  document.getElementById('s-tunnel').textContent = tunnelRaw || '—';

  // Generate connection string from tunnel URL (preferred) or LAN URL
  const sourceUrl = tunnelRaw || lanRaw;
  const cs = makeConnectionString(sourceUrl, s.token);
  const csEl = document.getElementById('s-cs');
  if (cs) {
    csEl.textContent = cs;
  } else {
    csEl.textContent = '— (start tunnel or connect LAN first)';
    csEl.style.color = '#8b949e';
  }
}

function renderProjects(allProjects, sharedProjects) {
  const card = document.getElementById('projects-card');
  if (!allProjects.length) {
    card.innerHTML = '<div style="color:#8b949e">No git repos found in PROJECTS_ROOT.</div>';
    return;
  }
  const sharedMap = new Map(sharedProjects.map(p => [p.name, p]));

  card.innerHTML = allProjects.map(p => {
    const sharedEntry = sharedMap.get(p.name);
    const isShared = p.shared || !!sharedEntry;
    const currentRole = sharedEntry ? (sharedEntry.role || '') : '';
    const hasPeers = sharedEntry && sharedEntry.peers && sharedEntry.peers.length > 0;

    const nameWithBadge = isShared
      ? `${esc(p.name)} <span class="badge badge-green" style="margin-left:4px">shared</span>`
      : esc(p.name);

    const controls = isShared
      ? `<div class="project-controls">
          <select onchange="setProjectRole('${esc(p.name)}', this.value)" title="Set sync role for this project">
            <option value=""${currentRole === '' ? ' selected' : ''}>Symmetric</option>
            <option value="leader"${currentRole === 'leader' ? ' selected' : ''}>Leader</option>
            <option value="follower"${currentRole === 'follower' ? ' selected' : ''}>Follower</option>
          </select>
          ${hasPeers ? `<button class="secondary" onclick="checkSync('${esc(p.name)}', this)">↕ Sync</button>` : ''}
          <button class="danger" onclick="unshare('${esc(p.name)}')">Unshare</button>
         </div>`
      : `<div class="project-controls">
          <button onclick="share('${esc(p.path)}', '${esc(p.name)}')">Share</button>
         </div>`;

    return `<div class="project-row">
      <div class="project-info">
        <div class="project-name">${nameWithBadge}<span id="sync-${esc(p.name)}" class="sync-indicator"></span></div>
        <div class="project-path" title="${esc(p.path)}">${esc(p.path)}</div>
      </div>
      ${controls}
    </div>`;
  }).join('');
}

function renderPeers(peers) {
  const card = document.getElementById('peers-card');
  if (!peers.length) {
    card.innerHTML = '<div style="color:#8b949e">No peers connected.</div>';
    return;
  }
  card.innerHTML = peers.map(p =>
    `<div class="peer-card">
      <div class="peer-header">
        <span style="font-weight:bold">${esc(p.name)}</span>
        <span class="val" style="flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${esc(p.url)}</span>
      </div>
      <div class="peer-projects" id="peer-proj-${esc(p.name)}">
        <span style="color:#8b949e;font-size:0.8rem">Loading peer projects…</span>
      </div>
    </div>`
  ).join('');

  // Fetch each peer's projects asynchronously
  for (const p of peers) {
    loadPeerProjects(p.name);
  }
}

async function loadPeerProjects(peerName) {
  const el = document.getElementById('peer-proj-' + peerName);
  if (!el) return;
  try {
    const data = await fetch(`/api/peer-status?peer=${encodeURIComponent(peerName)}`).then(r => r.json());
    if (data.error) {
      el.innerHTML = `<span class="peer-project-item" style="color:#f85149">Offline: ${esc(data.error)}</span>`;
      return;
    }
    const shared = data.shared || [];
    if (!shared.length) {
      el.innerHTML = '<span class="peer-project-item">No projects shared by peer.</span>';
      return;
    }
    el.innerHTML = shared.map(proj =>
      `<div class="peer-project-item">
        <span class="badge badge-gray" style="margin-right:4px">${esc(proj.name)}</span>
        ${proj.role ? `<span class="badge badge-blue">${esc(proj.role)}</span>` : ''}
      </div>`
    ).join('');
  } catch (e) {
    el.innerHTML = `<span class="peer-project-item" style="color:#f85149">Could not reach peer: ${esc(e.message)}</span>`;
  }
}

// ── Actions ──────────────────────────────────────────────────────────────────

async function share(repoPath, name) {
  const resp = await fetch('/api/share', { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({ path: repoPath, name }) });
  const data = await resp.json();
  if (data.error) alert('Error: ' + data.error);
  else load();
}

async function unshare(name) {
  if (!confirm(`Unshare "${name}"?`)) return;
  const resp = await fetch('/api/unshare', { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({ name }) });
  const data = await resp.json();
  if (data.error) alert('Error: ' + data.error);
  else load();
}

async function setProjectRole(name, role) {
  const resp = await fetch('/api/project-role', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ name, role: role || null })
  });
  const data = await resp.json();
  if (data.error) alert('Error setting role: ' + data.error);
  // No full reload needed — role is purely local state, already reflected in dropdown
}

async function checkSync(projectName, btn) {
  const indicator = document.getElementById('sync-' + projectName);
  if (indicator) indicator.innerHTML = '<span style="color:#8b949e"> ↻</span>';
  if (btn) { btn.disabled = true; btn.textContent = '…'; }

  const entry = sharedRegistry.find(e => e.name === projectName);
  const peers = (entry && entry.peers) ? entry.peers : [];

  try {
    const results = await Promise.all(peers.map(async peer => {
      try {
        const data = await fetch(
          `/api/sync-status?project=${encodeURIComponent(projectName)}&remote=${encodeURIComponent(peer.name)}`
        ).then(r => r.json());
        return { peerName: peer.name, data };
      } catch (e) {
        return { peerName: peer.name, data: { error: e.message } };
      }
    }));

    if (!indicator) return;

    const multiPeer = peers.length > 1;
    const badges = results.map(({ peerName, data }) => {
      let badge;
      if (data.error) {
        badge = `<span class="badge badge-gray" title="${esc(data.error)}">err</span>`;
      } else {
        const { state, ahead, behind } = data;
        if (state === 'in-sync')           badge = `<span class="badge badge-green">✓ in sync</span>`;
        else if (state === 'local-ahead')  badge = `<span class="badge badge-blue">↑${ahead} ahead</span>`;
        else if (state === 'remote-ahead') badge = `<span class="badge badge-yellow">↓${behind} behind</span>`;
        else                               badge = `<span class="badge badge-orange">↕ diverged (↑${ahead} ↓${behind})</span>`;
      }
      return multiPeer
        ? `<span style="color:#8b949e;font-size:0.75rem">${esc(peerName)}</span> ${badge}`
        : badge;
    });

    indicator.innerHTML = ' ' + badges.join(' ');
  } catch (e) {
    if (indicator) indicator.innerHTML = ` <span class="badge badge-gray" title="${esc(e.message)}">err</span>`;
  } finally {
    if (btn) { btn.disabled = false; btn.textContent = '↕ Sync'; }
  }
}

async function doConnect() {
  const csInput = document.getElementById('c-cs').value.trim();
  const name    = document.getElementById('c-name').value.trim() || 'peer';
  const msg     = document.getElementById('connect-msg');

  if (!csInput) { msg.innerHTML = '<span class="error">Connection string is required</span>'; return; }

  // Parse cs1: connection string
  let peerUrl, peerToken;
  const parsed = parseConnectionString(csInput);
  if (parsed) {
    peerUrl   = parsed.url;
    peerToken = parsed.token;
  } else {
    // Fallback: treat as raw URL (may have embedded credentials)
    try {
      const u = new URL(csInput);
      if (u.password) { peerToken = u.password; u.username = ''; u.password = ''; }
      peerUrl = u.toString().replace(/\/$/, '');
    } catch {
      msg.innerHTML = '<span class="error">Invalid connection string — paste the cs1:… value from the peer\'s UI</span>';
      return;
    }
  }

  msg.innerHTML = '<span style="color:#8b949e">Connecting…</span>';
  try {
    const resp = await fetch('/api/connect', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ url: peerUrl, token: peerToken, name })
    });
    const data = await resp.json();
    if (data.error) {
      msg.innerHTML = `<span class="error">Error: ${esc(data.error)}</span>`;
    } else {
      msg.innerHTML = '<span class="success">Connected! Both sides wired. Set per-project roles in the projects list below.</span>';
      load();
    }
  } catch(e) {
    msg.innerHTML = `<span class="error">Error: ${esc(e.message)}</span>`;
  }
}

function copy(id) {
  const text = document.getElementById(id).textContent;
  if (text && text !== '—' && !text.startsWith('—')) navigator.clipboard.writeText(text).catch(() => {});
}

function esc(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

load();
setInterval(load, 15000);
</script>
</body>
</html>
