<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>code-share</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: monospace; background: #0d1117; color: #e6edf3; padding: 1.5rem; max-width: 900px; margin: 0 auto; }
  h1 { color: #58a6ff; margin-bottom: 1.5rem; font-size: 1.4rem; }
  h2 { color: #8b949e; font-size: 0.9rem; text-transform: uppercase; letter-spacing: 0.1em; margin: 1.5rem 0 0.75rem; }
  .card { background: #161b22; border: 1px solid #30363d; border-radius: 6px; padding: 1rem; margin-bottom: 1rem; }
  .row { display: flex; align-items: center; gap: 0.75rem; margin-bottom: 0.5rem; }
  .label { color: #8b949e; min-width: 100px; flex-shrink: 0; }
  .val { color: #e6edf3; word-break: break-all; flex: 1; }
  .badge { display: inline-block; padding: 2px 8px; border-radius: 12px; font-size: 0.75rem; }
  .badge-green { background: #1a4731; color: #3fb950; }
  .badge-gray { background: #21262d; color: #8b949e; }
  .badge-blue { background: #1c3452; color: #58a6ff; }
  button { background: #238636; color: #fff; border: none; padding: 4px 12px; border-radius: 4px; cursor: pointer; font-family: monospace; font-size: 0.85rem; }
  button:hover { background: #2ea043; }
  button.danger { background: #b62324; }
  button.danger:hover { background: #da3633; }
  button.secondary { background: #21262d; color: #e6edf3; border: 1px solid #30363d; }
  button.secondary:hover { background: #30363d; }
  input, select { background: #0d1117; border: 1px solid #30363d; color: #e6edf3; padding: 6px 10px; border-radius: 4px; font-family: monospace; font-size: 0.85rem; width: 100%; }
  .copy-btn { min-width: 60px; background: #1c3452; color: #58a6ff; border: 1px solid #1c3452; }
  .copy-btn:hover { background: #264a70; }
  .project-row { display: flex; align-items: center; gap: 0.75rem; padding: 0.5rem 0; border-bottom: 1px solid #21262d; }
  .project-row:last-child { border-bottom: none; }
  .project-name { font-weight: bold; flex: 1; }
  .project-path { color: #8b949e; font-size: 0.8rem; }
  .error { color: #f85149; font-size: 0.85rem; margin-top: 0.5rem; }
  .success { color: #3fb950; font-size: 0.85rem; margin-top: 0.5rem; }
  .section-row { display: flex; gap: 0.5rem; align-items: flex-end; margin-bottom: 0.75rem; }
  .section-row > div { flex: 1; }
  .section-row label { color: #8b949e; font-size: 0.8rem; display: block; margin-bottom: 4px; }
  #connect-msg { margin-top: 0.5rem; font-size: 0.85rem; }
</style>
</head>
<body>
<h1>code-share</h1>

<h2>Your Link</h2>
<div class="card" id="status-card">
  <div class="row"><span class="label">Status</span><span class="val" id="s-status">Loading…</span></div>
  <div class="row"><span class="label">LAN URL</span><span class="val" id="s-lan">—</span><button class="copy-btn" onclick="copy('s-lan')">Copy</button></div>
  <div class="row"><span class="label">Tunnel URL</span><span class="val" id="s-tunnel">—</span><button class="copy-btn" onclick="copy('s-tunnel')">Copy</button></div>
  <div class="row"><span class="label">Token</span><span class="val" id="s-token">—</span><button class="copy-btn" onclick="copy('s-token')">Copy</button></div>
</div>

<h2>Projects under PROJECTS_ROOT</h2>
<div class="card" id="projects-card"><div style="color:#8b949e">Loading…</div></div>

<h2>Connect a Peer</h2>
<div class="card">
  <div class="section-row">
    <div><label>Peer URL (their serve URL)</label><input id="c-url" placeholder="http://x:token@host:9419"></div>
    <div style="max-width:120px"><label>Peer Token</label><input id="c-token" placeholder="token"></div>
  </div>
  <div class="section-row">
    <div><label>Local name for peer</label><input id="c-name" value="peer"></div>
    <div><label>Role</label>
      <select id="c-role">
        <option value="">Symmetric (no leader)</option>
        <option value="leader">Leader</option>
        <option value="follower">Follower</option>
      </select>
    </div>
  </div>
  <button onclick="doConnect()">Connect</button>
  <div id="connect-msg"></div>
</div>

<h2>Connected Peers</h2>
<div class="card" id="peers-card"><div style="color:#8b949e">No peers connected.</div></div>

<script>
let status = null;

async function load() {
  try {
    const [s, p] = await Promise.all([
      fetch('/api/status').then(r => r.json()),
      fetch('/api/projects').then(r => r.json())
    ]);
    status = s;
    renderStatus(s);
    renderProjects(p, s.shared || []);
    renderPeers(s.peers || []);
  } catch(e) {
    document.getElementById('s-status').textContent = 'Error: ' + e.message;
  }
}

function renderStatus(s) {
  document.getElementById('s-status').innerHTML = '<span class="badge badge-green">serving</span>';
  const lanUrl = s.selfUrl || '—';
  const tunnelUrl = s.tunnelUrl || '—';
  document.getElementById('s-lan').textContent = lanUrl;
  document.getElementById('s-tunnel').textContent = tunnelUrl;
  document.getElementById('s-token').textContent = s.token || '—';
}

function renderProjects(allProjects, sharedProjects) {
  const card = document.getElementById('projects-card');
  if (!allProjects.length) {
    card.innerHTML = '<div style="color:#8b949e">No git repos found in PROJECTS_ROOT.</div>';
    return;
  }
  const sharedNames = new Set(sharedProjects.map(p => p.name));
  card.innerHTML = allProjects.map(p => {
    const isShared = p.shared || sharedNames.has(p.name);
    return `<div class="project-row">
      <div>
        <div class="project-name">${esc(p.name)}
          ${isShared ? '<span class="badge badge-green" style="margin-left:6px">shared</span>' : ''}
        </div>
        <div class="project-path">${esc(p.path)}</div>
      </div>
      ${isShared
        ? `<button class="danger" onclick="unshare('${esc(p.name)}')">Unshare</button>`
        : `<button onclick="share('${esc(p.path)}', '${esc(p.name)}')">Share</button>`
      }
    </div>`;
  }).join('');
}

function renderPeers(peers) {
  const card = document.getElementById('peers-card');
  if (!peers.length) {
    card.innerHTML = '<div style="color:#8b949e">No peers connected.</div>';
    return;
  }
  card.innerHTML = peers.map(p =>
    `<div class="project-row">
      <div class="project-name">${esc(p.name)}</div>
      <div class="val">${esc(p.url)}</div>
      <span class="badge ${p.role ? 'badge-blue' : 'badge-gray'}">${p.role || 'symmetric'}</span>
    </div>`
  ).join('');
}

async function share(repoPath, name) {
  const resp = await fetch('/api/share', { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({ path: repoPath, name }) });
  const data = await resp.json();
  if (data.error) alert('Error: ' + data.error);
  else load();
}

async function unshare(name) {
  if (!confirm(`Unshare "${name}"?`)) return;
  const resp = await fetch('/api/unshare', { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({ name }) });
  const data = await resp.json();
  if (data.error) alert('Error: ' + data.error);
  else load();
}

async function doConnect() {
  const url = document.getElementById('c-url').value.trim();
  const token = document.getElementById('c-token').value.trim();
  const name = document.getElementById('c-name').value.trim() || 'peer';
  const role = document.getElementById('c-role').value || null;
  const msg = document.getElementById('connect-msg');

  if (!url) { msg.innerHTML = '<span class="error">Peer URL is required</span>'; return; }

  msg.innerHTML = '<span style="color:#8b949e">Connecting…</span>';
  try {
    const resp = await fetch('/api/connect', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ url, token, name, role })
    });
    const data = await resp.json();
    if (data.error) {
      msg.innerHTML = `<span class="error">Error: ${esc(data.error)}</span>`;
    } else {
      msg.innerHTML = '<span class="success">Connected! Both sides wired.</span>';
      load();
    }
  } catch(e) {
    msg.innerHTML = `<span class="error">Error: ${esc(e.message)}</span>`;
  }
}

function copy(id) {
  const text = document.getElementById(id).textContent;
  if (text && text !== '—') navigator.clipboard.writeText(text).catch(() => {});
}

function esc(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

load();
setInterval(load, 15000);
</script>
</body>
</html>
